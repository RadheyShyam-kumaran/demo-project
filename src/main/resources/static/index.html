<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --accent: #c8a96e;
      --accent-dark: #a8893e;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #e8e4dc;
      --danger: #e05252;
      --success: #4caf7d;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      background: #edfaf3;
      color: var(--success);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #b6ecd1;
    }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }

    .stat-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text);
    }

    .stat-value span {
      font-size: 1rem;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
    }

    .toolbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    input[type="text"] {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      background: var(--surface);
      outline: none;
      width: 220px;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    /* BUTTONS */
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: transparent;
      border: 1px solid #fcc;
      color: var(--danger);
      padding: 6px 14px;
      font-size: 0.82rem;
    }

    .btn-danger:hover { background: #fff0f0; }

    .btn-edit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      font-size: 0.82rem;
    }

    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease both;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      background: linear-gradient(135deg, #f0ebe0, #e8e0d0);
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body { padding: 20px; }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--accent-dark);
    }

    .card-qty {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--text);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 300;
      display: none;
      animation: toastIn 0.3s ease;
    }

    .toast.show { display: block; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      main { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Product<span>Store</span></div>
    <div class="header-right">
      <span class="status-badge" id="statusBadge">● Connecting...</span>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="totalProducts">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Stock</div>
        <div class="stat-value" id="totalStock">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg. Price</div>
        <div class="stat-value" id="avgPrice">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="section-title">All Products</div>
      <div class="toolbar-right">
        <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()"/>
        <button class="btn btn-outline" onclick="loadProducts()">↻ Refresh</button>
      </div>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="product-grid">
      <div class="loading">Loading products...</div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add Product</div>
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="inputName" placeholder="e.g. Wireless Keyboard"/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="inputDesc" placeholder="Short description"/>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="text" id="inputPrice" placeholder="e.g. 49.99"/>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="text" id="inputQty" placeholder="e.g. 100"/>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/products';
    let allProducts = [];

    const ICONS = ['💻','📱','🎧','📷','⌨️','🖥️','🖨️','📺','🎮','⌚','🔋','💡'];

    function getIcon(name) {
      let hash = 0;
      for (let c of name) hash += c.charCodeAt(0);
      return ICONS[hash % ICONS.length];
    }

    async function loadProducts() {
      try {
        const res = await fetch(API);
        allProducts = await res.json();
        renderProducts(allProducts);
        updateStats(allProducts);
        document.getElementById('statusBadge').textContent = '● Live';
        document.getElementById('statusBadge').style.color = '#4caf7d';
      } catch (e) {
        document.getElementById('productGrid').innerHTML =
          `<div class="empty"><div class="empty-icon">⚠️</div><h3>Could not connect to API</h3><p>Make sure the backend is running</p></div>`;
      }
    }

    function updateStats(products) {
      document.getElementById('totalProducts').innerHTML = products.length + ' <span>items</span>';
      const stock = products.reduce((s, p) => s + p.quantity, 0);
      document.getElementById('totalStock').innerHTML = stock + ' <span>units</span>';
      const avg = products.length ? (products.reduce((s, p) => s + p.price, 0) / products.length).toFixed(2) : 0;
      document.getElementById('avgPrice').innerHTML = '$' + avg;
    }

    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      if (!products.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><h3>No products found</h3><p>Add your first product!</p></div>`;
        return;
      }
      grid.innerHTML = products.map((p, i) => `
        <div class="product-card" style="animation-delay:${i * 0.06}s">
          <div class="card-top">${getIcon(p.name)}</div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.description}</div>
          </div>
          <div class="card-footer">
            <div class="card-price">$${p.price.toFixed(2)}</div>
            <div class="card-qty">Qty: ${p.quantity}</div>
          </div>
          <div class="card-actions">
            <button class="btn btn-edit" onclick="openEditModal(${p.id})">✏️ Edit</button>
            <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    }

    function filterProducts() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allProducts.filter(p =>
        p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q)
      );
      renderProducts(filtered);
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Product';
      document.getElementById('editId').value = '';
      document.getElementById('inputName').value = '';
      document.getElementById('inputDesc').value = '';
      document.getElementById('inputPrice').value = '';
      document.getElementById('inputQty').value = '';
      document.getElementById('modalOverlay').classList.add('active');
    }

    function openEditModal(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('editId').value = p.id;
      document.getElementById('inputName').value = p.name;
      document.getElementById('inputDesc').value = p.description;
      document.getElementById('inputPrice').value = p.price;
      document.getElementById('inputQty').value = p.quantity;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    async function saveProduct() {
      const id = document.getElementById('editId').value;
      const body = {
        name: document.getElementById('inputName').value,
        description: document.getElementById('inputDesc').value,
        price: parseFloat(document.getElementById('inputPrice').value),
        quantity: parseInt(document.getElementById('inputQty').value)
      };
      if (!body.name || !body.description || isNaN(body.price) || isNaN(body.quantity)) {
        showToast('⚠️ Please fill all fields correctly');
        return;
      }
      try {
        if (id) {
          await fetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
          showToast('✅ Product updated!');
        } else {
          await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
          showToast('✅ Product added!');
        }
        closeModal();
        loadProducts();
      } catch (e) {
        showToast('❌ Something went wrong');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      showToast('🗑 Product deleted');
      loadProducts();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    loadProducts();
  </script>
</body>
</html>
