name: Build and Deploy to Azure

# Trigger: runs automatically when code is pushed to main branch
on:
  push:
    branches:
      - main

# Constant variables that get values from GitHub Secrets
env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: demo-app
  RESOURCE_GROUP: ${{ secrets.AZURE_RG }}
  APP_NAME: ${{ secrets.AZURE_APP_NAME }}

jobs:
  build-and-deploy:
    # Build runs on Ubuntu latest version
    runs-on: ubuntu-latest

    steps:
      # 1: Download code from GitHub branch into pipeline machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2: Install Java JDK 21 (Temurin is a distribution like OpenJDK)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3: Compile Java code and create JAR file inside target/ folder
      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      # 4: Login to Azure Container Registry using ACR credentials
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 5: Build Docker image and push to ACR
      # Image name format: mydemorsr.azurecr.io/demo-app:<unique-commit-id>
      # github.sha provides a unique ID for every push
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      # 6: Login to Azure using Service Principal credentials (JSON)
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #  7: Tell Azure Web App to use the newly pushed image
      # This replaces the old image with the new one automatically
      - name: Deploy to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --docker-custom-image-name ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            --docker-registry-server-url https://${{ secrets.ACR_NAME }}.azurecr.io \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      #  8: Restart Web App so it picks up and runs the new image
          az webapp restart \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RG }}