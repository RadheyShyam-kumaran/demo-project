name: Build and Deploy to Azure

on:
  push:
    branches:
      - main		# used to trigger when push to main 

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: demo-app
  RESOURCE_GROUP: ${{ secrets.AZURE_RG }}		# these are the constant variable which we get data from secreats
  APP_NAME: ${{ secrets.AZURE_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest		# build runs on ubuntu os and latest version

    steps:
      - name: Checkout code			# used to get data github branch
        uses: actions/checkout@v4

      - name: Set up Java 21		# we are setting up the java jdk files
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # this is a distributor like openjdk

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests	# here we are creating jar file which will be there inside the target file

      - name: Log in to Azure Container Registry  
        uses: docker/login-action@v3		#this action is a docker based action used to login the docker using the env 
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }} .  # used to create image and last part is the format for image name and .sha will provide the unique id  
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }}  # now we are pushing the code 

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}		# here we are getting the login credits by using the the id of the admin user

      - name: Deploy to Azure App Service
        run: |											# meanwhile we have create the container registry and enabled the admin user , noted the password and then create a app-severce in free loction ,in docker section add dummy image 
          az webapp config container set \		# container setting
            --name ${{ secrets.AZURE_APP_NAME }} \  # regconise the app
            --resource-group ${{ secrets.AZURE_RG }} \	# here this command is used to deploy in azure app automatically it will replace image which is already there
            --docker-custom-image-name ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }} \	
            --docker-registry-server-url https://${{ secrets.ACR_NAME }}.azurecr.io \ 
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \   #  applyes the values to login
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

          az webapp restart \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RG }} # redoplying the latest image